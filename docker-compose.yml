services:
  foodcalc-api:
    image: foodcalc-api
    build:
      context: .
      dockerfile: FoodCalc.Api/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Server=sql-server;Database=FoodCalc;User Id=sa;Password=testPassWord!@;TrustServerCertificate=True;
    ports:
      - "5000:80"
    networks:
      - foodcalc-network

  foodcalc-web:
    image: foodcalc-web
    build:
      context: .
      dockerfile: FoodCalc.Web/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - API__BaseAddress=http://foodcalc-api
    ports:
      - "5001:8080"
    depends_on:
      - foodcalc-api
    networks:
      - foodcalc-network

  sql-server:
    # deploy:
    #    resources:
    #      limits:
    #        memory: 2G  
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=testPassWord!@
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sql-data:/var/opt/mssql
    healthcheck:
      # Simplified health check that checks if SQL Server is running
      test: ["CMD", "/opt/mssql-tools/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "testPassWord!@", "-Q", "SELECT 1"]
      interval: 20s
      timeout: 10s
      retries: 4
      start_period: 60s  # Give SQL Server more time to initialize
    networks:
      - foodcalc-network

networks:
  foodcalc-network:
    driver: bridge

volumes:
  sql-data:
